name: Plugin CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: plugin-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core verification
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Type-check core
        run: npm run typecheck

      - name: Test core
        run: npm test

  vscode:
    name: VS Code (${{ matrix.os }})
    needs: core
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install shared core dependencies
        run: npm ci

      - name: Install VS Code dependencies
        run: npm --prefix plugins/vscode ci

      - name: Check VS Code plugin
        run: npm --prefix plugins/vscode run check

      - name: Package VS Code plugin
        run: npm --prefix plugins/vscode run package

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: ai-change-radar-vscode-${{ matrix.os }}
          path: plugins/vscode/*.vsix
          if-no-files-found: error
          retention-days: 14

  intellij:
    name: IntelliJ IDEA
    needs: core
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x plugins/intellij/gradlew

      - name: Test, build, and validate IntelliJ plugin
        working-directory: plugins/intellij
        run: ./gradlew --no-daemon test buildPlugin verifyPluginProjectConfiguration verifyPluginStructure verifyPlugin

      - name: Upload IntelliJ plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ai-change-radar-intellij
          path: plugins/intellij/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 14
